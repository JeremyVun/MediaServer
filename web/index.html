<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0C0D10" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F7F6F3" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Media" />
    <title>Media</title>
    <script>
      // Apply the theme before first paint — no flash of wrong theme.
      ;(function () {
        // Any stored value is trusted — custom themes are arbitrary names. An
        // unknown name falls through to the :root (dark) defaults, and
        // ThemeProvider re-validates against the theme registry on mount.
        var stored = localStorage.getItem('theme')
        var theme = stored || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
